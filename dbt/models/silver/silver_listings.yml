version: 2

models:
  - name: silver_listings
    description: "Table nettoyée des annonces immobilières."

    columns:

      - name: listing_id
        tests:
          - unique
          - not_null

      - name: price
        tests:
          - not_null

      - name: surface_m2
        tests:
          - not_null

      - name: listing_date
        tests:
          - not_null

      - name: property_type
        tests:
          - not_null